<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduSistema Pro v5</title>

<!--
  ══════════════════════════════════════════════════════════════════
  ARQUITECTURA DE ARCHIVOS
  ══════════════════════════════════════════════════════════════════

  Frontend:
    index.html   ← este archivo (solo estructura HTML)
    styles.css   ← todos los estilos visuales
    app.js       ← lógica de UI, cálculos, PDF, Excel
    api-layer.js ← puente con MongoDB (sobreescribe funciones de app.js)

  Backend  (carpeta separada: edusistema-backend/):
    server.js         ← Express + mongoose, corre en puerto 3001
    config/db.js      ← conexión a MongoDB Atlas
    routes/auth.js    ← POST /api/auth/login
    routes/db.js      ← GET  /api/db
    routes/api.js     ← resto de endpoints (/api/*)
    middleware/auth.js← validación JWT

  ══════════════════════════════════════════════════════════════════
  PARA ARRANCAR EL SISTEMA
  ══════════════════════════════════════════════════════════════════

  1. Edita .env del backend:
       MONGODB_URI=mongodb+srv://usuario:PASSWORD@cluster.mongodb.net/edusistema
       JWT_SECRET=una_cadena_muy_larga_y_segura
       PORT=3001
       FRONTEND_URL=http://localhost:5500   ← o tu dominio de producción

  2. Instala dependencias e inicializa datos:
       cd edusistema-backend
       npm install
       node scripts/seed.js

  3. Arranca el backend:
       npm start
       → Verifica: http://localhost:3001/health

  4. Abre index.html con Live Server (puerto 5500) o tu servidor web.

  ══════════════════════════════════════════════════════════════════
  CORS — server.js permite estas origins:
    http://localhost:5500   (VS Code Live Server — desarrollo)
    http://127.0.0.1:5500
    http://localhost:3000
    variable FRONTEND_URL del .env (producción)

  Si usas otro puerto, agrégalo en corsOptions dentro de server.js.
  ══════════════════════════════════════════════════════════════════
-->

<!-- ─── Librerías externas ──────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ─── Estilos propios ─────────────────────────────────────────── -->
<link rel="stylesheet" href="styles (1).css">
</head>

<body>

<!-- ════════════════════════════════════════
     PANTALLA DE LOGIN
════════════════════════════════════════ -->
<div id="ls">
  <div class="lgw">
    <div class="lgh">
      <div class="lgm">🏛️</div>
      <h1>EduSistema<br><em>Pro</em></h1>
      <p>Plataforma académica integral — notas tripartitas, clases virtuales, excusas dirigidas, reportes y más.</p>
      <div class="lgr">
        <span class="lgc a">ADMIN</span>
        <span class="lgc p">PROFESOR</span>
        <span class="lgc e">ESTUDIANTE</span>
      </div>
    </div>
    <div class="lgc2">
      <h2>Bienvenido</h2>
      <p class="sub">Ingresa tus credenciales institucionales</p>
      <!-- Credencial de administrador por defecto: admin / admin123
           Cámbiala en producción desde el panel de administración. -->
      <div class="fld">
        <label>Usuario</label>
        <input type="text" id="liu" placeholder="nombre.usuario" autocomplete="username">
      </div>
      <div class="fld">
        <label>Contraseña</label>
        <input type="password" id="lip" placeholder="••••••••" autocomplete="current-password">
      </div>
      <!-- Mensaje de error de login (manejado por api-layer.js → doLogin) -->
      <div id="lierr" style="font-size:13px;color:var(--red);margin-bottom:12px;display:none;
        padding:8px 12px;background:var(--rbg);border-radius:8px;border:1px solid #fed7d7"></div>
      <!-- onclick="doLogin()" → implementado en api-layer.js, llama POST /api/auth/login -->
      <button class="bl" onclick="doLogin()">Ingresar →</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     APP SHELL (oculta hasta hacer login)
════════════════════════════════════════ -->
<div id="app" class="hidden">

  <!-- Sidebar de navegación -->
  <nav class="sidebar" id="sidebar">
    <div class="sbh">
      <div class="sblo">
        <div class="sbli">🏛️</div>
        <div>
          <div class="sbln">EduSistema Pro</div>
          <div class="sbls">Plataforma Académica</div>
        </div>
      </div>
      <!-- Información del usuario actual — poblado por bootApp() en app.js -->
      <div class="sbu" id="sbUser"></div>
    </div>

    <!-- Items de navegación — generados por buildNav() en app.js según rol -->
    <div class="sbnav" id="sbNav"></div>

    <div class="sbft">
      <!-- onclick="doLogout()" → implementado en api-layer.js, limpia token JWT -->
      <button class="sbi" onclick="doLogout()" style="width:100%">
        <span class="ic">🚪</span>Cerrar Sesión
      </button>
    </div>
  </nav>

  <!-- Área de contenido principal -->
  <div class="main">
    <div class="topbar">
      <!-- Título dinámico de la sección actual -->
      <span class="tbti" id="tbTitle">Panel</span>
      <div class="tbr">
        <!-- Fecha actual -->
        <span class="tbdt" id="tbDate"></span>
        <!-- Indicador de conexión al backend -->
        <span id="tbStatus"></span>
      </div>
    </div>
    <!-- Contenido de la vista activa — inyectado por renderPg() en app.js -->
    <div class="cnt" id="contentArea"></div>
  </div>

</div>

<!-- Contenedor oculto para generación de PDFs (html2pdf.js) -->
<div id="pdfBox" class="hidden"></div>


<!-- ════════════════════════════════════════
     SCRIPTS — ORDEN OBLIGATORIO
════════════════════════════════════════

  1. app.js
     Carga primero. Contiene toda la lógica de UI, cálculos de notas,
     generación de PDF/Excel y renderizado de vistas.
     Las funciones que necesitan backend tienen stubs vacíos aquí:
       dbLoad(), dbSave(), doLogin(), doLogout(), saveTri(), saveExt(),
       addEst(), delEst(), editEst(), saveAst(), envExcusa(), etc.

  2. api-layer.js
     Carga segundo. Sobreescribe todos los stubs anteriores con
     implementaciones reales que usan fetch() hacia el backend Express.
     También maneja el token JWT en sessionStorage ('edu_jwt').

     Endpoint base: http://localhost:3001  (API_BASE en api-layer.js)
     Rutas del backend (server.js):
       POST   /api/auth/login          → autenticación, devuelve JWT
       GET    /api/db                  → carga completa de la BD
       PUT    /api/notas/:eid/:per/:mat → guardar nota
       POST   /api/usuarios            → crear usuario
       DELETE /api/usuarios/:id        → eliminar usuario
       PUT    /api/usuarios/:id        → editar usuario
       PUT    /api/asistencias         → guardar asistencia
       POST   /api/excusas             → enviar excusa
       POST   /api/vclases             → agregar clase virtual
       DELETE /api/vclases/:id         → eliminar clase virtual
       POST   /api/uploads             → subir taller (base64, máx 25mb)
       PUT    /api/uploads/:id/revisar → marcar taller revisado
       DELETE /api/uploads/:id         → eliminar taller
       POST   /api/recuperaciones      → subir respuesta de recuperación
       PUT    /api/recuperaciones/:id/revisar → marcar revisado
       DELETE /api/recuperaciones/:id  → eliminar recuperación
       POST   /api/recuperaciones/archivar → archivar al cerrar periodo
       POST   /api/planes/archivar     → archivar planes del periodo
       POST   /api/planes              → guardar plan de recuperación
       POST   /api/salones             → crear salón
       PUT    /api/salones/:nombre     → editar materias del salón
       DELETE /api/salones/:nombre     → eliminar salón
       PUT    /api/config/:key         → guardar config (dr, drPer, ext, anoActual, mP, mB, pers)
       PUT    /api/bloqueos/:usuario   → bloquear/desbloquear usuario
       PUT    /api/notas/:eid/disciplina → guardar nota de disciplina
       PUT    /api/est-hist/:id        → actualizar historial de estudiante
       POST   /api/auditoria           → registrar evento de auditoría
       DELETE /api/auditoria           → limpiar auditoría
       GET    /health                  → estado del servidor

  SIN BACKEND: Si quieres correr solo con localStorage (desarrollo),
  comenta o elimina la línea <script src="api-layer.js"></script>.
  app.js funciona de forma autónoma en ese modo.
-->
<script src="app (1) (1).js"></script>
<script src="api-layer.js"></script>

</body>
</html>
